_schema-version: "3.2"
ID: tns.fsm.inspreppdfviewext.ui
version: 1.0.0
description: Inspection Report PDF Viewer — FSM checklist report preview extension (side-by-side, Node.js/Express + SAPUI5)

parameters:
  enable-parallel-deployments: true

modules:
  - name: tns-fsm-inspreppdfviewext-ui
    type: nodejs
    path: .
    parameters:
      buildpack: nodejs_buildpack
      command: npm start
      memory: 256M
      disk-quota: 512M
      # CF generates the host automatically, per environment (DEV/QA/PROD are
      # different subaccounts -> different domains -> different URLs). No pinned
      # route, no per-environment .mtaext needed.
      default-route: true
    requires:
      - name: fsm-inspreppdfviewext-destination
    build-parameters:
      builder: custom
      commands:
        - npm ci --omit=dev
      ignore:
        - ".git/"
        - "docs/"
        - "dist/"
        - "resources/"
        - "mta_archives/"
        - "*.mtaext"

resources:
  # Reuse the EXISTING destination instance (same name in every space).
  # Must be CREATED + configured in each target subaccount (cockpit) first.
  # Secrets (FSM_WEBCONTAINER_AUTH_KEY) are set manually in each CF space
  # (cockpit User-Provided Variables or cf set-env) — not in this file.
  - name: fsm-inspreppdfviewext-destination
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: fsm-inspreppdfviewext-destination